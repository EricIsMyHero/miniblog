<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNEC Exam Materials</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #020617;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

.search-box {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: none;
  outline: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: #334155;
}

.card h3 {
  margin: 0 0 10px;
}

.card p {
  font-size: 14px;
  opacity: 0.8;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #3b82f6;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-size: 14px;
}

footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>
<body>

<header>
UNEC Exam Materials
</header>

<div class="container">

<input type="text" class="search-box" placeholder="Search materials..." onkeyup="searchCards()">

<div class="grid" id="grid">

<div class="card">
<h3>Microeconomics</h3>
<p>PDF materials for exam</p>
<a href="#" class="btn">Download</a>
</div>

<div class="card">
<h3>Macroeconomics</h3>
<p>PDF materials for exam</p>
<a href="#" class="btn">Download</a>
</div>

<div class="card">
<h3>Statistics</h3>
<p>PDF materials for exam</p>
<a href="#" class="btn">Download</a>
</div>

</div>

</div>

<footer>
This site is not official. Created to help students find materials faster.
</footer>

<script>
function searchCards() {
  let input = document.querySelector('.search-box').value.toLowerCase();
  let cards = document.querySelectorAll('.card');

  cards.forEach(card => {
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(input) ? 'block' : 'none';
  });
}
</script>

</body>
</html>
